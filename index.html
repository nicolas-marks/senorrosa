<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Señor Rosa</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main id="app">

        <section id="landingScreen" class="screen active-screen">
            <h1>🌹 Señor Rosa</h1>

            <p>Learn Spanish by living the story.</p>

            <button id="startButton">
                Start Adventure
            </button>
        </section>

        <section id="gameScreen" class="screen">
            <div class="comic-page">

                <div class="comic-panel">
                    <p class="chapter-label">Chapter 1</p>

                    <h2>The Shadow in the Jungle</h2>

                    <p class="narration">
                        Rain falls over the Yucatán jungle.
                        Something moves behind the trees.
                    </p>

                    <button id="treeHotspot" class="hotspot">
                        Inspect the tree
                    </button>
                </div>

            </div>

            <nav class="hud">
                <button>📖 Journal</button>
                <span>🔑 Keys: 0</span>
                <button>🎒 Backpack</button>
                <span>Chapter 1</span>
            </nav>
        </section>

    </main>

    <script src="game.js"></script>

</body>
