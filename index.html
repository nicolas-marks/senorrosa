<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Señor Rosa — True Stories in Comics</title>
  <meta
    name="description"
    content="Illustrated true stories from life between Oregon and Mexico."
  >

  <meta property="og:title" content="Señor Rosa">
  <meta
    property="og:description"
    content="True stories from Oregon and Mexico, told through comics."
  >
  <meta property="og:type" content="website">
  <meta property="og:image" content="assets/senorrosa2.png">

  <link rel="icon" href="assets/senorrosa2.png">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <header class="site-header">
    <a class="brand" href="/" aria-label="Señor Rosa home">
      <img
        class="brand-logo"
        src="assets/senorrosa2.png"
        alt="Señor Rosa and Jake"
      >

      <div class="brand-text">
        <span class="brand-name">Señor Rosa</span>
        <span class="brand-tagline">True stories. Real life.</span>
      </div>
    </a>

    <div class="future-nav" aria-label="Future site navigation">
      <span>More coming soon</span>
    </div>
  </header>

  <main class="comic-page">
    <section class="comic-intro">
      <p class="eyebrow">Illustrated stories from Oregon and Mexico</p>
      <h1 id="comic-title">Señor Rosa Comics</h1>
      <p id="comic-description" class="comic-description">
        True stories, questionable Spanish, and an unusually large Doberman.
      </p>
    </section>

    <nav class="comic-navigation top-navigation" aria-label="Comic navigation">
      <button id="previous-button" class="nav-button" type="button">
        ← Previous
      </button>

      <span id="comic-counter" class="comic-counter">
        Comic 1 of 4
      </span>

      <button id="next-button" class="nav-button" type="button">
        Next →
      </button>
    </nav>

    <article class="comic-reader">
      <img
        id="comic-image"
        class="comic-image"
        src="comics/comictest1.png"
        alt="Señor Rosa comic"
      >
    </article>

    <nav class="comic-navigation bottom-navigation" aria-label="Comic navigation">
      <button id="previous-button-bottom" class="nav-button" type="button">
        ← Previous
      </button>

      <a class="home-button" href="#top">
        Back to top
      </a>

      <button id="next-button-bottom" class="nav-button" type="button">
        Next →
      </button>
    </nav>

    <section class="contact-section">
      <p>
        Curious people can email
        <a href="mailto:info@senorrosa.com">info@senorrosa.com</a>.
      </p>
    </section>
  </main>

  <footer class="site-footer">
    <p>© <span id="current-year"></span> Señor Rosa</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
