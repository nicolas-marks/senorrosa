<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Señor Rosa</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <main id="app">
        <section id="landingScreen" class="screen active-screen">
            <h1>🌹 Señor Rosa</h1>
            <p>Learn Spanish by living the story.</p>
            <button id="startButton" type="button">Start Adventure</button>
        </section>

        <section id="gameScreen" class="screen">
            <div class="comic-page">
                <div class="chapter-header">
                    <p id="chapterLabel" class="chapter-label">Chapter 1</p>
                    <h2 id="chapterTitle">The Shadow in the Jungle</h2>
                </div>

                <div id="comicSequence" class="comic-sequence"></div>
            </div>

            <nav class="hud">
                <button id="journalButton" type="button">📖 Journal</button>

                <span>
                    🔑 Keys:
                    <strong id="keyCount">0</strong>
                </span>

                <button type="button">🎒 Backpack</button>
                <span id="chapterBadge">Chapter 1</span>
            </nav>

            <div id="vocabChallenge" class="challenge hidden">
                <h3>Vocabulary Challenge</h3>
                <p id="challengeQuestion">What is “tree” in Spanish?</p>

                <div class="answer-grid">
                    <button class="answer-button" type="button"></button>
                    <button class="answer-button" type="button"></button>
                    <button class="answer-button" type="button"></button>
                </div>

                <p id="challengeMessage" class="challenge-message"></p>
            </div>

            <div id="challengeOverlay" class="challenge-overlay hidden"></div>

            <div id="journalPanel" class="journal-panel hidden">
                <div class="journal-header">
                    <h2>Vocabulary Journal</h2>
                    <button id="closeJournalButton" type="button">Close</button>
                </div>

                <div id="journalWords">
                    <p class="empty-journal">You have not discovered any words yet.</p>
                </div>
            </div>
        </section>
    </main>

    <script src="js/game.js"></script>
</body>
</html>
